name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t tarun01a/cloudjob-backend:latest ./backend

      - name: Push Backend Image
        run: |
          docker push tarun01a/cloudjob-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t tarun01a/cloudjob-frontend:latest ./frontend

      - name: Push Frontend Image
        run: |
          docker push tarun01a/cloudjob-frontend:latest